services:
  - type: web
    name: tunetransfer
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install && pnpm build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: VITE_SPOTIFY_CLIENT_ID
        sync: false
